server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: all client-side routes fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the runtime env file or the HTML shell.
    location = /env-config.js {
        add_header Cache-Control "no-store" always;
    }
    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    # Cache fingerprinted static assets aggressively.
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?|mp4)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}

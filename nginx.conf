server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve files, fall back to index.html for unknown routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # MVP / preview route — where the real site is being built.
    # /mvp and /mvp/ both serve mvp.html
    location = /mvp {
        try_files /mvp.html =404;
    }
    location = /mvp/ {
        try_files /mvp.html =404;
    }

    # Admin panel — revizyon istekleri (basit şifre korumalı, client-side)
    location = /admin {
        try_files /admin.html =404;
    }
    location = /admin/ {
        try_files /admin.html =404;
    }

    # Cache static assets
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 256;
}

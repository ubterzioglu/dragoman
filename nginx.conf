server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Site retired: redirect everything to dragoman-turkey.com. 301 (permanent)
    # tells search engines to drop this host from their index in favor of the
    # target, so no separate noindex/robots handling is needed here.
    location / {
        return 301 https://dragoman-turkey.com$request_uri;
    }
}

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dragoman SeaKayak — çok yakında. Denizle buluşmaya hazırlanın." />
  <meta name="theme-color" content="#016352" />
  <meta property="og:title" content="Dragoman SeaKayak — Çok Yakında" />
  <meta property="og:description" content="Rehberli deniz kayağı turları ve maceraları. Çok yakında denizdeyiz." />
  <meta property="og:image" content="logo.png" />
  <title>Dragoman SeaKayak — Çok Yakında</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange: #f16e0b;
      --orange-soft: #ff8a33;
      --teal: #016352;
      --teal-deep: #014439;
      --teal-light: #0a8a74;
      --foam: #eaf6f3;
      --ink: #042b25;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: "Poppins", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #fff;
      background: radial-gradient(circle at 20% 15%, #0a8a74 0%, transparent 45%),
                  radial-gradient(circle at 85% 25%, #02715e 0%, transparent 40%),
                  linear-gradient(160deg, #014439 0%, #016352 55%, #013a31 100%);
      min-height: 100%;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }

    /* Floating sun glow */
    .glow {
      position: fixed;
      top: -160px; right: -120px;
      width: 460px; height: 460px;
      background: radial-gradient(circle, rgba(241,110,11,0.55), transparent 65%);
      filter: blur(20px);
      pointer-events: none;
      animation: pulse 7s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.12); opacity: 1; }
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 3rem 1.25rem 8rem;
      position: relative;
      z-index: 3;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(241,110,11,0.16);
      border: 1px solid rgba(241,110,11,0.5);
      color: var(--orange-soft);
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.5rem 1.1rem;
      border-radius: 999px;
      margin-bottom: 2rem;
      animation: fadeUp 0.8s ease both;
    }
    .badge .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 0 0 rgba(241,110,11,0.7);
      animation: blink 1.8s infinite;
    }
    @keyframes blink {
      0% { box-shadow: 0 0 0 0 rgba(241,110,11,0.7); }
      70% { box-shadow: 0 0 0 10px rgba(241,110,11,0); }
      100% { box-shadow: 0 0 0 0 rgba(241,110,11,0); }
    }

    .logo-wrap {
      background: #fff;
      padding: 1.6rem 2rem;
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(1,40,33,0.45);
      animation: fadeUp 0.9s ease 0.1s both, bob 5s ease-in-out infinite 1s;
      margin-bottom: 2.5rem;
    }
    .logo-wrap img {
      display: block;
      width: min(340px, 70vw);
      height: auto;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 4.4rem);
      font-weight: 800;
      line-height: 1.05;
      margin-bottom: 1rem;
      animation: fadeUp 0.9s ease 0.2s both;
    }
    h1 .accent { color: var(--orange); }

    .tagline {
      font-size: clamp(1rem, 2.6vw, 1.25rem);
      max-width: 30ch;
      opacity: 0.9;
      margin-bottom: 2.6rem;
      animation: fadeUp 0.9s ease 0.3s both;
    }

    /* Countdown */
    .countdown {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2.8rem;
      animation: fadeUp 0.9s ease 0.4s both;
    }
    .unit {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      padding: 1rem 0.6rem;
      min-width: 80px;
    }
    .unit .num {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 800;
      color: #fff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .unit .lbl {
      font-size: 0.7rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-top: 0.4rem;
    }

    /* Newsletter */
    .signup {
      display: flex;
      gap: 0.6rem;
      width: min(440px, 92vw);
      animation: fadeUp 0.9s ease 0.5s both;
    }
    .signup input {
      flex: 1;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: #fff;
      padding: 0.9rem 1.1rem;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.2s, background 0.2s;
    }
    .signup input::placeholder { color: rgba(255,255,255,0.6); }
    .signup input:focus { border-color: var(--orange); background: rgba(255,255,255,0.16); }
    .signup button {
      border: none;
      background: var(--orange);
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      padding: 0 1.6rem;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
      box-shadow: 0 10px 26px rgba(241,110,11,0.4);
    }
    .signup button:hover { transform: translateY(-2px); background: var(--orange-soft); }
    .signup button:active { transform: translateY(0); }

    .msg {
      margin-top: 1rem;
      font-size: 0.9rem;
      color: var(--orange-soft);
      min-height: 1.2em;
      animation: fadeUp 0.4s ease both;
    }

    .socials {
      display: flex;
      gap: 1rem;
      margin-top: 2.4rem;
      animation: fadeUp 0.9s ease 0.6s both;
    }
    .socials a {
      width: 44px; height: 44px;
      display: grid; place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      transition: background 0.2s, transform 0.15s, border-color 0.2s;
    }
    .socials a:hover { background: var(--orange); border-color: var(--orange); transform: translateY(-3px); }
    .socials svg { width: 20px; height: 20px; fill: currentColor; }

    /* Animated waves at bottom */
    .waves {
      position: fixed;
      bottom: 0; left: 0; width: 100%;
      line-height: 0;
      z-index: 1;
      pointer-events: none;
    }
    .waves svg { width: 100%; height: 130px; display: block; }
    .wave-move > use {
      animation: moveWave 12s cubic-bezier(.55,.5,.45,.5) infinite;
    }
    .wave-move > use:nth-child(1) { animation-delay: -2s; animation-duration: 9s; opacity: 0.35; }
    .wave-move > use:nth-child(2) { animation-delay: -3s; animation-duration: 12s; opacity: 0.5; }
    .wave-move > use:nth-child(3) { animation-delay: -4s; animation-duration: 16s; opacity: 0.85; }
    @keyframes moveWave {
      0% { transform: translate3d(-90px,0,0); }
      100% { transform: translate3d(85px,0,0); }
    }

    /* Paddling kayak */
    .kayak {
      position: fixed;
      bottom: 70px;
      left: -120px;
      z-index: 2;
      width: 90px;
      pointer-events: none;
      animation: paddle 22s linear infinite, rock 3s ease-in-out infinite;
    }
    .kayak svg { width: 100%; height: auto; }
    @keyframes paddle {
      0% { left: -120px; }
      100% { left: 105%; }
    }
    @keyframes rock {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }

    footer {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: 0.82rem;
      opacity: 0.65;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      .unit { min-width: 64px; padding: 0.8rem 0.4rem; }
      .signup { flex-direction: column; }
      .signup button { padding: 0.85rem; }
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <main>
    <div class="badge"><span class="dot"></span> Çok Yakında</div>

    <div class="logo-wrap">
      <img src="logo.png" alt="Dragoman SeaKayak" />
    </div>

    <h1>Denize <span class="accent">açılıyoruz</span></h1>
    <p class="tagline">Rehberli deniz kayağı turları, dersler ve unutulmaz kıyı maceraları. Sitemiz çok yakında burada.</p>

    <div class="countdown" id="countdown" aria-label="Açılışa kalan süre">
      <div class="unit"><div class="num" id="d">00</div><div class="lbl">Gün</div></div>
      <div class="unit"><div class="num" id="h">00</div><div class="lbl">Saat</div></div>
      <div class="unit"><div class="num" id="m">00</div><div class="lbl">Dakika</div></div>
      <div class="unit"><div class="num" id="s">00</div><div class="lbl">Saniye</div></div>
    </div>

    <form class="signup" id="signup">
      <input type="email" id="email" placeholder="E-posta adresiniz" required aria-label="E-posta adresiniz" />
      <button type="submit">Haber Ver</button>
    </form>
    <div class="msg" id="msg"></div>

    <div class="socials">
      <a href="#" aria-label="Instagram" title="Instagram">
        <svg viewBox="0 0 24 24"><path d="M12 2.16c3.2 0 3.58.01 4.85.07 1.17.05 1.8.25 2.23.41.56.22.96.48 1.38.9.42.42.68.82.9 1.38.16.42.36 1.06.41 2.23.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.05 1.17-.25 1.8-.41 2.23-.22.56-.48.96-.9 1.38-.42.42-.82.68-1.38.9-.42.16-1.06.36-2.23.41-1.27.06-1.65.07-4.85.07s-3.58-.01-4.85-.07c-1.17-.05-1.8-.25-2.23-.41a3.7 3.7 0 0 1-1.38-.9 3.7 3.7 0 0 1-.9-1.38c-.16-.42-.36-1.06-.41-2.23C2.17 15.58 2.16 15.2 2.16 12s.01-3.58.07-4.85c.05-1.17.25-1.8.41-2.23.22-.56.48-.96.9-1.38.42-.42.82-.68 1.38-.9.42-.16 1.06-.36 2.23-.41C8.42 2.17 8.8 2.16 12 2.16zm0 1.62c-3.15 0-3.5.01-4.74.07-1.14.05-1.76.24-2.17.4-.55.21-.94.47-1.35.88-.41.41-.67.8-.88 1.35-.16.41-.35 1.03-.4 2.17-.06 1.24-.07 1.59-.07 4.74s.01 3.5.07 4.74c.05 1.14.24 1.76.4 2.17.21.55.47.94.88 1.35.41.41.8.67 1.35.88.41.16 1.03.35 2.17.4 1.24.06 1.59.07 4.74.07s3.5-.01 4.74-.07c1.14-.05 1.76-.24 2.17-.4.55-.21.94-.47 1.35-.88.41-.41.67-.8.88-1.35.16-.41.35-1.03.4-2.17.06-1.24.07-1.59.07-4.74s-.01-3.5-.07-4.74c-.05-1.14-.24-1.76-.4-2.17a3.6 3.6 0 0 0-.88-1.35 3.6 3.6 0 0 0-1.35-.88c-.41-.16-1.03-.35-2.17-.4-1.24-.06-1.59-.07-4.74-.07zm0 2.76a5.3 5.3 0 1 1 0 10.6 5.3 5.3 0 0 1 0-10.6zm0 8.74a3.44 3.44 0 1 0 0-6.88 3.44 3.44 0 0 0 0 6.88zm6.74-8.94a1.24 1.24 0 1 1-2.48 0 1.24 1.24 0 0 1 2.48 0z"/></svg>
      </a>
      <a href="#" aria-label="Facebook" title="Facebook">
        <svg viewBox="0 0 24 24"><path d="M22 12a10 10 0 1 0-11.56 9.88v-6.99H7.9V12h2.54V9.8c0-2.5 1.49-3.89 3.78-3.89 1.09 0 2.24.2 2.24.2v2.46h-1.26c-1.24 0-1.63.77-1.63 1.56V12h2.78l-.44 2.89h-2.34v6.99A10 10 0 0 0 22 12z"/></svg>
      </a>
      <a href="mailto:info@dragomanseakayak.com" aria-label="E-posta" title="E-posta">
        <svg viewBox="0 0 24 24"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm0 4.24-8 5-8-5V6l8 5 8-5z"/></svg>
      </a>
    </div>
  </main>

  <!-- Paddling kayak -->
  <div class="kayak" aria-hidden="true">
    <svg viewBox="0 0 120 60">
      <path d="M8 38 Q60 56 112 38 Q60 46 8 38 Z" fill="#f16e0b"/>
      <line x1="40" y1="14" x2="80" y2="42" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
      <ellipse cx="38" cy="12" rx="7" ry="3.5" fill="#fff" transform="rotate(35 38 12)"/>
      <ellipse cx="82" cy="44" rx="7" ry="3.5" fill="#fff" transform="rotate(35 82 44)"/>
      <circle cx="60" cy="28" r="6" fill="#014439"/>
      <rect x="55" y="32" width="10" height="9" rx="4" fill="#014439"/>
    </svg>
  </div>

  <!-- Animated waves -->
  <div class="waves" aria-hidden="true">
    <svg viewBox="0 24 150 28" preserveAspectRatio="none">
      <defs>
        <path id="wavepath" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
      </defs>
      <g class="wave-move">
        <use href="#wavepath" x="48" y="0" fill="rgba(255,255,255,0.25)"/>
        <use href="#wavepath" x="48" y="3" fill="rgba(255,255,255,0.4)"/>
        <use href="#wavepath" x="48" y="6" fill="#eaf6f3"/>
      </g>
    </svg>
  </div>

  <footer>© <span id="year"></span> Dragoman SeaKayak — Tüm hakları saklıdır.</footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();

    // Countdown: 60 days from first visit (persisted), so it always counts toward a fixed launch.
    const KEY = "dragoman_launch";
    let target = Number(localStorage.getItem(KEY));
    if (!target || isNaN(target)) {
      target = Date.now() + 60 * 24 * 60 * 60 * 1000;
      localStorage.setItem(KEY, String(target));
    }

    const pad = (n) => String(n).padStart(2, "0");
    function tick() {
      const diff = Math.max(0, target - Date.now());
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById("d").textContent = pad(d);
      document.getElementById("h").textContent = pad(h);
      document.getElementById("m").textContent = pad(m);
      document.getElementById("s").textContent = pad(s);
    }
    tick();
    setInterval(tick, 1000);

    // Newsletter (front-end only — wire up to a real endpoint later)
    const form = document.getElementById("signup");
    const msg = document.getElementById("msg");
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      if (!email) return;
      msg.textContent = "Teşekkürler! Açıldığımızda " + email + " adresine haber vereceğiz. 🛶";
      form.reset();
    });
  </script>
</body>
</html>

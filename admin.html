<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#016352" />
  <title>Dragoman SeaKayak — Yönetim Paneli</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --orange: #f16e0b;
      --orange-soft: #ff8a33;
      --teal: #016352;
      --teal-deep: #014439;
      --teal-light: #0a8a74;
      --foam: #eaf6f3;
      --ink: #042b25;
      --sand: #f7f1e7;
      --gray: #6b7c79;
      --line: rgba(1,99,82,0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Poppins", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 10%, rgba(10,138,116,0.12), transparent 40%),
        linear-gradient(160deg, #f4faf8, #eef6f3);
      min-height: 100vh;
    }
    button, input, textarea, select { font-family: inherit; }

    /* ===== Login gate ===== */
    .gate {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
    }
    .gate-card {
      background: #fff;
      width: min(400px, 100%);
      border-radius: 22px;
      padding: 2.5rem 2rem;
      box-shadow: 0 24px 60px rgba(1,40,33,0.18);
      text-align: center;
    }
    .gate-card .logo { width: 180px; margin: 0 auto 1.5rem; display: block; }
    .gate-card h1 { font-size: 1.3rem; color: var(--teal-deep); margin-bottom: 0.3rem; }
    .gate-card p { color: var(--gray); font-size: 0.9rem; margin-bottom: 1.8rem; }
    .field { text-align: left; margin-bottom: 1rem; }
    .field label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--teal); margin-bottom: 0.4rem; }
    .field input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.15s, box-shadow 0.15s;
    }
    .field input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(241,110,11,0.12); }
    .btn {
      width: 100%;
      border: none;
      background: var(--orange);
      color: #fff;
      font-weight: 700;
      padding: 0.85rem;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s;
    }
    .btn:hover { background: var(--orange-soft); }
    .btn:active { transform: translateY(1px); }
    .err { color: #c0392b; font-size: 0.85rem; margin-top: 0.8rem; min-height: 1.1em; }

    /* ===== Panel ===== */
    .panel { display: none; }
    .panel.active { display: block; }

    .topbar {
      background: var(--teal-deep);
      color: #fff;
      padding: 0.8rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .topbar .brand { display: flex; align-items: center; gap: 0.7rem; font-weight: 700; }
    .topbar img { height: 34px; filter: brightness(0) invert(1); }
    .topbar .logout {
      background: rgba(255,255,255,0.12);
      color: #fff; border: 1px solid rgba(255,255,255,0.25);
      padding: 0.45rem 1rem; border-radius: 999px; cursor: pointer; font-size: 0.85rem;
      transition: background 0.15s;
    }
    .topbar .logout:hover { background: rgba(255,255,255,0.22); }

    .container { width: min(960px, 92%); margin: 2rem auto; }
    .page-head { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
    .page-head h2 { color: var(--teal-deep); font-size: 1.5rem; }
    .page-head .count { color: var(--gray); font-size: 0.9rem; }

    /* New request form */
    .new-req {
      background: #fff; border-radius: 18px; padding: 1.5rem;
      box-shadow: 0 10px 30px rgba(1,68,57,0.08); border: 1px solid var(--line);
      margin-bottom: 2rem;
    }
    .new-req h3 { color: var(--teal-deep); margin-bottom: 1rem; font-size: 1.05rem; }
    .new-req textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 12px;
      padding: 0.8rem 1rem; font-size: 0.95rem; resize: vertical; min-height: 90px; outline: none;
    }
    .new-req textarea:focus { border-color: var(--orange); }
    .new-req .row { display: flex; gap: 0.8rem; margin-top: 0.8rem; flex-wrap: wrap; }
    .new-req input, .new-req select {
      flex: 1; min-width: 140px;
      border: 1px solid var(--line); border-radius: 12px; padding: 0.7rem 0.9rem; font-size: 0.9rem; outline: none;
    }
    .new-req .submit { flex: 0 0 auto; background: var(--orange); color: #fff; border: none; font-weight: 700; padding: 0.7rem 1.6rem; border-radius: 12px; cursor: pointer; }
    .new-req .submit:hover { background: var(--orange-soft); }

    /* Requests list */
    .req {
      background: #fff; border-radius: 16px; padding: 1.3rem 1.5rem;
      box-shadow: 0 6px 20px rgba(1,68,57,0.06); border: 1px solid var(--line);
      border-left: 4px solid var(--orange);
      margin-bottom: 1rem;
    }
    .req .meta { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    .req .who { font-weight: 700; color: var(--teal-deep); }
    .req .date { color: var(--gray); font-size: 0.8rem; }
    .req .status {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      padding: 0.2rem 0.7rem; border-radius: 999px;
    }
    .status.open { background: rgba(241,110,11,0.15); color: var(--orange); }
    .status.progress { background: rgba(10,138,116,0.15); color: var(--teal-light); }
    .status.done { background: rgba(1,99,82,0.15); color: var(--teal); }
    .req .body { color: var(--ink); font-size: 0.95rem; }
    .req .actions { margin-top: 0.8rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .req .actions button {
      border: 1px solid var(--line); background: var(--foam); color: var(--teal);
      font-size: 0.8rem; font-weight: 600; padding: 0.35rem 0.8rem; border-radius: 8px; cursor: pointer;
      transition: background 0.15s;
    }
    .req .actions button:hover { background: #dcefe9; }

    .empty {
      text-align: center; color: var(--gray); padding: 3rem 1rem;
      border: 2px dashed var(--line); border-radius: 16px;
    }

    .note-banner {
      background: rgba(241,110,11,0.1);
      border: 1px solid rgba(241,110,11,0.3);
      color: #9a4a06;
      border-radius: 12px;
      padding: 0.8rem 1.1rem;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

  <!-- ===== Login gate ===== -->
  <div class="gate" id="gate">
    <div class="gate-card">
      <img class="logo" src="logo.png" alt="Dragoman SeaKayak" />
      <h1>Yönetim Paneli</h1>
      <p>Devam etmek için şifreyi girin.</p>
      <form id="loginForm">
        <div class="field">
          <label for="pw">Şifre</label>
          <input type="password" id="pw" autocomplete="current-password" required />
        </div>
        <button class="btn" type="submit">Giriş Yap</button>
        <div class="err" id="loginErr"></div>
      </form>
    </div>
  </div>

  <!-- ===== Admin panel ===== -->
  <div class="panel" id="panel">
    <div class="topbar">
      <div class="brand"><img src="logo.png" alt="" /> <span>Yönetim Paneli</span></div>
      <button class="logout" id="logoutBtn">Çıkış</button>
    </div>

    <div class="container">
      <div class="note-banner">
        ⚠️ Geçici şifre koruması aktif. Supabase entegrasyonu bağlandığında kayıtlar kalıcı olarak saklanacak.
      </div>

      <div class="page-head">
        <h2>Revizyon İstekleri</h2>
        <span class="count" id="count">0 istek</span>
      </div>

      <!-- New request -->
      <div class="new-req">
        <h3>Yeni Revizyon İsteği</h3>
        <form id="reqForm">
          <textarea id="reqBody" placeholder="Hangi değişiklik isteniyor? (örn: Ana sayfadaki fiyatları güncelle)" required></textarea>
          <div class="row">
            <input type="text" id="reqWho" placeholder="Talep eden (örn: Elif)" />
            <select id="reqStatus">
              <option value="open">Açık</option>
              <option value="progress">Devam Ediyor</option>
              <option value="done">Tamamlandı</option>
            </select>
            <button class="submit" type="submit">Ekle</button>
          </div>
        </form>
      </div>

      <!-- List -->
      <div id="list"></div>
    </div>
  </div>

  <script>
    /* =========================================================
       GEÇİCİ AUTH — ilk etap için basit client-side şifre.
       NOT: Gerçek güvenlik değildir; herkese açık kaynak kodda
       görünür. Supabase Auth bağlanınca burası değiştirilecek.
       ========================================================= */
    const ADMIN_PASSWORD = "dragoman2026"; // TODO: Supabase Auth ile değiştir
    const SESSION_KEY = "dragoman_admin_session";

    const gate = document.getElementById("gate");
    const panel = document.getElementById("panel");
    const loginForm = document.getElementById("loginForm");
    const loginErr = document.getElementById("loginErr");

    function showPanel() {
      gate.style.display = "none";
      panel.classList.add("active");
      renderRequests();
    }
    function showGate() {
      panel.classList.remove("active");
      gate.style.display = "grid";
    }

    // Oturum kontrolü
    if (sessionStorage.getItem(SESSION_KEY) === "1") showPanel();

    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const pw = document.getElementById("pw").value;
      if (pw === ADMIN_PASSWORD) {
        sessionStorage.setItem(SESSION_KEY, "1");
        loginErr.textContent = "";
        showPanel();
      } else {
        loginErr.textContent = "Hatalı şifre. Tekrar deneyin.";
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      sessionStorage.removeItem(SESSION_KEY);
      showGate();
    });

    /* =========================================================
       VERİ KATMANI — şimdilik localStorage (placeholder).
       Supabase bilgileri gelince aşağıdaki fonksiyonların içi
       Supabase çağrılarıyla değiştirilecek; arayüz aynı kalacak.

       Örn. ileride:
         const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
         async function fetchRequests() {
           const { data } = await supabase
             .from('revision_requests')
             .select('*').order('created_at', { ascending: false });
           return data;
         }
       ========================================================= */
    const STORE_KEY = "dragoman_revision_requests";

    function loadRequests() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }
      catch { return []; }
    }
    function saveRequests(list) {
      localStorage.setItem(STORE_KEY, JSON.stringify(list));
    }

    // --- Supabase ile değiştirilecek fonksiyonlar (placeholder) ---
    async function fetchRequests() {
      // TODO: Supabase'den çek
      return loadRequests();
    }
    async function addRequest(req) {
      // TODO: Supabase'e insert
      const list = loadRequests();
      list.unshift(req);
      saveRequests(list);
    }
    async function updateStatus(id, status) {
      // TODO: Supabase'de update
      const list = loadRequests().map(r => r.id === id ? { ...r, status } : r);
      saveRequests(list);
    }
    async function deleteRequest(id) {
      // TODO: Supabase'de delete
      saveRequests(loadRequests().filter(r => r.id !== id));
    }
    // -------------------------------------------------------------

    const statusLabels = { open: "Açık", progress: "Devam Ediyor", done: "Tamamlandı" };

    function fmtDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString("tr-TR", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    }

    async function renderRequests() {
      const list = await fetchRequests();
      const wrap = document.getElementById("list");
      document.getElementById("count").textContent = list.length + " istek";

      if (!list.length) {
        wrap.innerHTML = '<div class="empty">Henüz revizyon isteği yok. Yukarıdan ilk isteği ekleyin.</div>';
        return;
      }

      wrap.innerHTML = list.map(r => `
        <div class="req">
          <div class="meta">
            <span class="who">${esc(r.who || "Anonim")}</span>
            <span class="status ${r.status}">${statusLabels[r.status] || r.status}</span>
            <span class="date">${fmtDate(r.created_at)}</span>
          </div>
          <div class="body">${esc(r.body)}</div>
          <div class="actions">
            <button data-act="open" data-id="${r.id}">Açık</button>
            <button data-act="progress" data-id="${r.id}">Devam</button>
            <button data-act="done" data-id="${r.id}">Tamamlandı</button>
            <button data-act="delete" data-id="${r.id}">Sil</button>
          </div>
        </div>
      `).join("");

      wrap.querySelectorAll("button[data-act]").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          const act = btn.dataset.act;
          if (act === "delete") {
            await deleteRequest(id);
          } else {
            await updateStatus(id, act);
          }
          renderRequests();
        });
      });
    }

    document.getElementById("reqForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const body = document.getElementById("reqBody").value.trim();
      if (!body) return;
      const who = document.getElementById("reqWho").value.trim();
      const status = document.getElementById("reqStatus").value;
      await addRequest({
        id: "r_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
        body, who, status,
        created_at: new Date().toISOString(),
      });
      e.target.reset();
      renderRequests();
    });
  </script>
</body>
</html>
